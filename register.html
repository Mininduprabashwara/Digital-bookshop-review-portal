    <center>
        <legend align="center"><h2 style="color: rgb(30, 19, 187);">Login</h2> </legend>
        <form style="font-size: larger; ">
             <label for="fname">First Name*:</label>
                <input type="text" id="fname" placeholder="enter your first name" name="fname"><br> <br>
             <label for="lname">Last Name*:</label>
                <input type="text" id="lname" placeholder="enter your last name" name="lname"><br> <br>
             <label for="email">Email Address*:</label>
                <input type="email" id="email" placeholder="enter your email" name="email"><br> <br>
             <label for="password">Password*:</label>
                <input type="password" id="password" placeholder="enter your password" name="password"><br> <br>
            <input type="checkbox" id="check" name="check"> 
             <label for="check" id="check"> Remember Me</label> <br> <br>
              <input type="submit" value="Login" style="background-color: aqua; height: 30px; width: 200px; ">
        </form>
    </center> <br> <br> <br> <br>

    <center>
        <legend align="center"><h2 style="color: rgb(30, 19, 187);">Register</h2> </legend>
        <form style="font-size: larger; ">
             <label for="fn">First Name*:</label>
                <input type="text" id="fn" placeholder="enter your first name" name="fn"><br> <br>
             <label for="ln">Last Name*:</label>
                <input type="text" id="ln" placeholder="enter your last name" name="ln"><br> <br>
              <b>   NOTE:Please provide a valid email to receive order updates via email</b> <br> <br>
             <label for="email">Email Address*:</label>
                <input type="email" id="email" placeholder="enter your email" name="email"><br> <br>
               
             <label for="password">Password*:</label>
                <input type="password" id="password" placeholder="enter your password" name="password"><br> <br>
           
              <input type="submit" value="Register" style="background-color: aqua; height: 30px; width: 200px; ">
        </form>
